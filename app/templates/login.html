<html>
    <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kamban - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      background: #f7f5ff;
    }

    .lado-esquerdo {
      width: 50%;
      background: #33146a;
      display: flex;
      flex-direction: column;
      padding: 36px 48px 48px;
      position: relative;
      overflow: hidden;
    }

    .lado-esquerdo::before {
      content: '';
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: #9f67f4;
      opacity: 0.22;
      top: -80px;
      left: -80px;
    }

    .lado-esquerdo::after {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #7c3aed;
      opacity: 0.18;
      bottom: 80px;
      right: -40px;
    }

    .circulo-extra {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #c7aaff;
      opacity: 0.08;
      bottom: 120px;
      left: 60px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .logo-icone {
      width: 40px;
      height: 40px;
      background: #9f67f4;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: white;
    }

    .logo span {
      font-size: 18px;
      font-weight: 700;
      color: white;
    }

    .ilustracao {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .ilustracao svg {
      width: 100%;
      max-width: 420px;
      height: auto;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.25));
    }

    .tagline {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .tagline h2 {
      font-size: 26px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .tagline h2 span {
      color: #c7aaff;
    }

    .tagline p {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(199, 170, 255, 0.85);
      line-height: 1.6;
    }

    .lado-direito {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card-form {
      background: white;
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 432px;
      box-shadow: 0 4px 6px rgba(124,58,237,0.06), 0 12px 40px rgba(124,58,237,0.08);
      position: relative;
    }

    .logo-card {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      background: #7c3aed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
    }

    .card-form h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: #1a1233;
      margin-top: 16px;
    }

    .card-form .subtitulo {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #1a1233;
      margin-top: 4px;
    }

    .card-form .descricao {
      text-align: center;
      font-size: 13px;
      color: #7f72a6;
      margin-top: 6px;
    }

    hr {
      border: none;
      border-top: 1px solid #d9d2ef;
      margin: 20px 0;
    }

    .campo {
      margin-bottom: 18px;
    }

    .campo label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #7f72a6;
      margin-bottom: 6px;
    }

    .campo input {
      width: 100%;
      height: 46px;
      background: #f5f3fd;
      border: 1.5px solid #d9d2ef;
      border-radius: 10px;
      padding: 0 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1a1233;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .campo input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }

    .campo input::placeholder {
      color: rgba(127,114,166,0.5);
    }

    .campo-senha {
      position: relative;
    }

    .btn-mostrar {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: 500;
      color: #a07bf0;
      cursor: pointer;
      user-select: none;
    }

    .linha-esqueceu {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .link-esqueceu {
      font-size: 12px;
      font-weight: 500;
      color: #a07bf0;
      text-decoration: none;
    }

    .link-esqueceu:hover {
      text-decoration: underline;
    }

    .btn-entrar {
      width: 100%;
      height: 50px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
      transition: background 0.2s, transform 0.1s;
    }

    .btn-entrar:hover {
      background: #6d28d9;
      transform: translateY(-1px);
    }

    .btn-entrar:active {
      transform: translateY(0);
    }

    .rodape-card {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #7f72a6;
    }

    .rodape-card a {
      color: #7c3aed;
      font-weight: 600;
      text-decoration: none;
    }

    .rodape-card a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .lado-esquerdo {
        display: none;
      }
      .lado-direito {
        width: 100%;
      }
    }
  </style>
</head>
</html>
