<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kamban — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:       #7c3aed;
      --purple-light: #9f67f4;
      --purple-dark:  #33146a;
      --purple-pale:  #c7aaff;
      --purple-bg:    #f5f0ff;
      --white:        #ffffff;
      --off-white:    #f7f5ff;
      --input-bg:     #f5f3fd;
      --border:       #d9d2ef;
      --dark:         #1a1233;
      --muted:        #7f72a6;
      --accent:       #a07bf0;
      --green:        #21c88c;
      --pink:         #eb599a;
      --yellow:       #f9d933;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--off-white);
    }

    /* ── LAYOUT PRINCIPAL ── */
    .page {
      display: flex;
      min-height: 100vh;
    }

    /* ── PAINEL ESQUERDO ── */
    .left-panel {
      flex: 0 0 50%;
      background: var(--purple-dark);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 36px 48px 48px;
    }

    /* Círculos decorativos de fundo */
    .left-panel::before,
    .left-panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .left-panel::before {
      width: 340px; height: 340px;
      top: -80px; left: -80px;
      background: var(--purple-light);
      opacity: 0.22;
    }
    .left-panel::after {
      width: 280px; height: 280px;
      bottom: 80px; right: -40px;
      background: var(--purple);
      opacity: 0.18;
    }

    .dec-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      width: 180px; height: 180px;
      bottom: 120px; left: 60px;
      background: var(--purple-pale);
      opacity: 0.08;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--purple-light);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--white);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
    }

    .logo-name {
      font-size: 18px; font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    /* Ilustração SVG */
    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      margin: 0 -10px;
    }

    .illustration svg {
      width: 100%;
      max-width: 420px;
      height: auto;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.25));
    }

    /* Texto tagline */
    .tagline {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .tagline h2 {
      font-size: 26px; font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .tagline h2 span {
      color: var(--purple-pale);
    }

    .tagline p {
      margin-top: 10px;
      font-size: 14px; color: rgba(199,170,255,0.85);
      line-height: 1.6;
    }

    /* ── PAINEL DIREITO ── */
    .right-panel {
      flex: 0 0 50%;
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* Card do formulário */
    .form-card {
      background: var(--white);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 432px;
      box-shadow: 0 4px 6px rgba(124,58,237,0.06), 0 12px 40px rgba(124,58,237,0.08);
      position: relative;
    }

    /* Logo centralizado no topo do card */
    .card-logo {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px; height: 48px;
      background: var(--purple);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: var(--white);
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
    }

    .form-card h1 {
      text-align: center;
      font-size: 26px; font-weight: 700;
      color: var(--dark);
      margin-top: 16px;
    }

    .form-card .subtitle {
      text-align: center;
      font-size: 15px; font-weight: 600;
      color: var(--dark);
      margin-top: 4px;
    }

    .form-card .sub2 {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .divider-line {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* Campos */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 46px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }

    .field input::placeholder { color: rgba(127,114,166,0.5); }

    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }

    .field-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .forgot {
      font-size: 12px; font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }

    .forgot:hover { text-decoration: underline; }

    /* Botão entrar */
    .btn-primary {
      width: 100%;
      height: 50px;
      background: var(--purple);
      color: var(--white);
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: rgba(255,255,255,0.12);
      border-radius: 12px 12px 0 0;
      pointer-events: none;
    }

    .btn-primary:hover {
      background: #6d28d9;
      box-shadow: 0 6px 20px rgba(124,58,237,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    /* Divisor OU */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .or-divider span {
      flex: 1; height: 1px;
      background: var(--border);
    }

    .or-divider p {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Botão Google */
    .btn-google {
      width: 100%;
      height: 44px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--dark);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-google:hover {
      background: #ede9fb;
      border-color: var(--purple-light);
    }

    .google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* Footer do card */
    .card-footer {
      margin-top: 20px;
      text-align: center;
    }

    .card-footer p {
      font-size: 13px;
      color: var(--muted);
    }

    .card-footer a {
      color: var(--purple);
      font-weight: 600;
      text-decoration: none;
    }

    .card-footer a:hover { text-decoration: underline; }

    /* ── RESPONSIVO ── */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { flex: 1; }
    }
  </style>
</head>
